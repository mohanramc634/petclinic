name: Build Official PetClinic
on:
  workflow_dispatch:

jobs:
  maven-build:
    runs-on: petclinic-runner
    # REMOVED the container section to avoid Docker errors


    steps:

      - name: Checkout Official PetClinic
        uses: actions/checkout@v4
        with:
          repository: spring-projects/spring-petclinic
          ref: main

      # - name: Set up JDK 17
      #   uses: actions/setup-java@v4
      #   with:
      #     java-version: '17'
      #     distribution: 'temurin'

      # - name: Maven Package
      #   run: ./mvnw package -DskipTests
      - name: Maven Package
        run: mvn package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-petclinic-jar
          path: target/*.jar

# Generate the Dockerfile dynamically since we checked out an external repo
      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          # Added docker.io/ to specify the registry explicitly
          FROM docker.io/eclipse-temurin:17-jre-alpine
          WORKDIR /app
          COPY target/*.jar app.jar
          EXPOSE 8080
          ENTRYPOINT ["java", "-jar", "app.jar"]
          EOF
      - name: Fix subuid/subgid and configure buildah
        run: |
          # Write subuid/subgid for current user
          USERNAME=$(whoami)
          echo "${USERNAME}:100000:65536" | sudo tee /etc/subuid
          echo "${USERNAME}:100000:65536" | sudo tee /etc/subgid

          # Ensure newuidmap/newgidmap are setuid
          sudo chmod u+s /usr/bin/newuidmap /usr/bin/newgidmap

          # Force vfs driver + chroot isolation — no kernel namespace needed
          mkdir -p ~/.config/containers
          cat > ~/.config/containers/storage.conf <<EOF
          [storage]
          driver = "vfs"
          EOF
      - name: Login to GHCR
        run: |
          echo "${{ secrets.TOKEN }}" | buildah login ghcr.io -u ${{ github.actor }} --password-stdin

        # Build the container image using the native Buildah CLI
      - name: Build Image with Buildah
        run: |
          buildah bud --storage-driver=vfs --isolation=chroot --userns=host -t ghcr.io/mohanramc634/spring-petclinic:${{ github.sha }} -f Dockerfile .
      - name: Push Image with Buildah
        run: |
          buildah push --storage-driver=vfs ghcr.io/mohanramc634/spring-petclinic:${{ github.sha }}
