name: PetClinic CI — Build JAR & Push Docker Image
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger from GitHub UI
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/petclinic
 
jobs:
  # ============================================================
  # JOB 1 — Build JAR with Maven on ARC runner
  # ============================================================
  build-jar:
    name: Build JAR (Maven)
    runs-on: petclinic-runner   # your ARC scale set name
 
    steps:
      # ── 1. Checkout official PetClinic source ──────────────
      - name: Checkout Spring PetClinic
        uses: actions/checkout@v4
        with:
          repository: spring-projects/spring-petclinic
          ref: main
 
      # ── 2. Set up JDK 17 ───────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs
 
      # ── 3. Build JAR ────────────────────────────────────────
      - name: Build JAR with Maven
        run: mvn -B clean package -DskipTests=false
 
      # ── 4. Show what was built ──────────────────────────────
      - name: List build output
        run: ls -lh target/*.jar
 
      # ── 5. Upload JAR as workflow artifact ──────────────────
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: target/*.jar
          retention-days: 7     # keep for 7 days
 
      # ── 6. Save JAR for next job (passed via artifact) ──────
      - name: Export JAR filename
        id: jar
        run: echo "file=$(ls target/*.jar | head -1)" >> $GITHUB_OUTPUT
 
    outputs:
      jar_file: ${{ steps.jar.outputs.file }}
 
